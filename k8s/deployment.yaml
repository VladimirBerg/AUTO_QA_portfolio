apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa-test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qa-test-app
  template:
    metadata:
      labels:
        app: qa-test-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: qa-test-service
spec:
  selector:
    app: qa-test-app
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
